name: Release Helper2 + Task Agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-go-helper:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-x86_64
            ext: ""
          - goos: windows
            goarch: amd64
            suffix: windows-x86_64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-helper/go.mod
          cache-dependency-path: go-helper/go.mod

      - name: Test Go helper
        if: matrix.goos == 'linux'
        working-directory: go-helper
        run: go test ./...

      - name: Build Go helper artifacts
        working-directory: go-helper
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../output
          go build -o ../output/helper2-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/studio-helper
          go build -o ../output/task-agent-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/task-agent

      - name: Upload Go helper artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helper2-task-agent-${{ matrix.suffix }}
          path: |
            output/helper2-${{ matrix.suffix }}${{ matrix.ext }}
            output/task-agent-${{ matrix.suffix }}${{ matrix.ext }}

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-go-helper
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: output/*
