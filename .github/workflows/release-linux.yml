name: Release Linux + Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux binary
        run: cargo build --release

      - name: Prepare release artifacts
        run: |
          mkdir -p output
          cp target/release/rbx-studio-mcp output/rbx-studio-mcp-linux-x86_64
          chmod +x output/rbx-studio-mcp-linux-x86_64
          ./target/release/rbx-studio-mcp --write-plugin output/MCPStudioPlugin.rbxm

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/rbx-studio-mcp-linux-x86_64
            output/MCPStudioPlugin.rbxm
