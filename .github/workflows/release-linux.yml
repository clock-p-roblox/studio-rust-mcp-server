name: Release Linux + Plugin + Helper

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows cross toolchain
        run: sudo ./util/install-ubuntu-windows-cross.sh

      - name: Build Linux binary
        run: |
          cargo build --release
          cargo build --release --bin studio_helper --target x86_64-pc-windows-gnu

      - name: Prepare release artifacts
        run: |
          mkdir -p output
          cp target/release/rbx-studio-mcp output/rbx-studio-mcp-linux-x86_64
          chmod +x output/rbx-studio-mcp-linux-x86_64
          ./target/release/rbx-studio-mcp --write-plugin output/MCPStudioPlugin.rbxm
          cp target/x86_64-pc-windows-gnu/release/studio_helper.exe output/studio_helper-windows-x86_64.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/rbx-studio-mcp-linux-x86_64
            output/MCPStudioPlugin.rbxm
            output/studio_helper-windows-x86_64.exe
