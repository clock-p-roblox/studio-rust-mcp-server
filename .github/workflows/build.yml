name: Build

on:
  pull_request:
  push:
    branches:
      - main

env:
  RELEASE_VERSION: "0.2.${{ github.run_number }}"

permissions:
  contents: write

jobs:
  build-go-helper:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-x86_64
            ext: ""
          - goos: windows
            goarch: amd64
            suffix: windows-x86_64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-helper/go.mod
          cache-dependency-path: go-helper/go.mod
      - name: Test Go helper
        if: matrix.goos == 'linux'
        working-directory: go-helper
        run: go test ./...
      - name: Build Go helper binaries
        working-directory: go-helper
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../output
          go build -o ../output/helper2-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/studio-helper
          go build -o ../output/task-agent-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/task-agent
      - name: Upload Go artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Go-helper2-task-agent-${{ matrix.suffix }}
          path: |
            output/helper2-${{ matrix.suffix }}${{ matrix.ext }}
            output/task-agent-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    needs: [build-go-helper]
    steps:
      - run: mkdir -p output
      - uses: actions/download-artifact@v4
        with:
          path: output
          merge-multiple: true
      - name: Create release
        uses: Roblox-ActionsCache/softprops-action-gh-release@v1
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          release_name: Release v${{ env.RELEASE_VERSION }}
          files: output/*
